version: 2

updates:
  - package-ecosystem: "composer"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "friday"
      time: "19:00"
    open-pull-requests-limit: 10
    groups:
      composer-dependencies:
        patterns:
          - "*"

  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "friday"
      time: "19:00"
    open-pull-requests-limit: 10
    groups:
      npm-dependencies:
        patterns:
          - "*"
